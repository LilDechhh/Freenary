services:
  db:
    image: postgres:15
    container_name: pg_finary_dechaux
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bdd_finary_dechaux
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data